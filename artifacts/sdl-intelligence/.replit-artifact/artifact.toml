kind = "web"
previewPath = "/"
title = "SDL Intelligence"
version = "1.0.0"
id = "artifacts/sdl-intelligence"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18575

[services.development]
run = "pnpm --filter @workspace/sdl-intelligence run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sdl-intelligence", "run", "build" ]
publicDir = "artifacts/sdl-intelligence/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18575"
BASE_PATH = "/"
